specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Email Verifier API
providerId: email-verifier-api
created: '2026-05-06'
modified: '2026-05-06'
reconciled: true
tags:
  - Email Verification
  - Deliverability
  - SMTP Check
  - Bounce Prevention
description: |-
  Email Verifier API uses a transparent, pay-as-you-go credit model. There are no
  subscriptions or contracts; customers buy credits in fixed packs and the credits
  never expire. Only "Paid" verification events (mailbox-level outcomes that require
  an SMTP probe) consume credits. Free events (syntax errors, missing DNS / MX,
  catch-all, greylisting, transient errors) do not draw down the balance. A free tier
  of 100 credits is granted at signup with no credit card required, and high-volume
  custom pricing is available through sales.
sources:
  - https://emailverifierapi.com/pricing/
  - https://emailverifierapi.com/api-docs/
notes: |-
  Per-email price falls as the credit pack size increases, from $0.0080/email at
  1,000 credits down to $0.0013/email at 10,000,000 credits. Credits never expire
  and are deducted only for Paid events, so the effective per-deliverable-result
  cost is slightly lower than the headline credit price.
plans:
