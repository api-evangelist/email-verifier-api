    name: Free
    type: free
    description: Free tier granted at registration. No credit card required.
    entries:
      - label: Free credits
        name: free_credits
        type: one-time
        metric: credit
        limit: 100
        timeFrame: lifetime
        geo: global
        unit: 100
        price: 0
        userMultiplied: false
    elements:
      - name: 16-point verification engine
